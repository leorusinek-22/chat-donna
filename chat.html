<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Donna Capricciosa</title>
    <style>
        :root { --primary: #d946ef; --bg: #fdf4ff; --chat-bg: #ffffff; --text: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; height: 85vh; background: var(--chat-bg); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #f0abfc; }
        #header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #f3f4f6; color: #374151; border-bottom-left-radius: 2px; border: 1px solid #e5e7eb; }
        #input-area { padding: 20px; border-top: 1px solid #f3f4f6; display: flex; gap: 10px; background: white; }
        input { flex: 1; border: 1px solid #e5e7eb; padding: 12px; border-radius: 10px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 10px 22px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Assistente Donna Capricciosa ✨</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Tire suas dúvidas sobre nossos produtos...">
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script>
    const WEBHOOK_URL = 'https://leorusinek.app.n8n.cloud/webhook/chat';
    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    
    // Identificador único da conversa para a memória da IA
    const sessionId = 'dc_' + Math.random().toString(36).substr(2, 9);

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, sessionId })
            });

            if (!response.ok) throw new Error();

            const data = await response.json();
            addMessage(data.reply || "Estou aqui para ajudar! Pode repetir?", 'bot');
        } catch (error) {
            addMessage("Ops! Tive um problema de conexão. Verifique se o workflow está Ativo.", 'bot');
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    addMessage("Olá! Sou a assistente da Donna Capricciosa. Como posso ajudar você hoje?", "bot");
</script>

</body>
</html>
